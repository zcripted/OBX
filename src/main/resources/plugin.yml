name: SF-Core
main: dev.sergeantfuzzy.sfcore.Main
version: ${project.version}
description: Essentials-style core utilities. Single JAR, runtime-adapts to Paper / Spigot / PurPur / Folia from 1.8.8 to 26.1.x.
author: SergeantFuzzy
website: https://sfcore.sergeantfuzzy.dev
folia-supported: true
load: POSTWORLD
# api-version tells modern (1.13+) Paper / Spigot that this plugin uses the
# post-flattening API. Without it the server treats the plugin as "legacy"
# and bootstraps Bukkit's CraftLegacy material translation table — that init
# is what stalls modern startup for 15-30+ seconds with the warning
# "[CraftLegacy] Initializing Legacy Material Support. Unless you have
# legacy plugins and/or data this is a bug!"
#
# 1.13 is intentionally the lowest value: it satisfies every 1.13+ server
# (skipping the legacy init) while older 1.8 - 1.12 servers ignore the field
# entirely, so the single-JAR cross-version target is preserved. Material
# lookups in this plugin already cascade through name-fallback chains
# (e.g. WarpMenuStyling.resolveMaterial), so we never relied on the legacy
# translator in the first place.
api-version: '1.13'
libraries:
  - org.xerial:sqlite-jdbc:3.45.3.0
commands:
  sf:
    description: Shows SF-Core help, information, and admin tools.
    aliases: [sfcore, sfc]
    usage: "/sf <subcommand>"
  help:
    description: Opens the SF-Core paginated help GUI.
    aliases: ["?"]
    usage: "/<command>"
    permission: sfcore.help.gui
  home:
    description: Teleport to one of your homes.
    usage: "/<command> [name]"
    permission: sfcore.home
  sethome:
    description: Set a named home at your current location.
    usage: "/<command> [name]"
    permission: sfcore.home.set
  delhome:
    description: Delete one of your homes.
    usage: "/<command> <name>"
    permission: sfcore.home.delete
  homes:
    description: List all of your homes.
    usage: "/<command>"
    permission: sfcore.home.list
  spawn:
    description: Teleport to the server spawn point or manage spawn.
    usage: "/spawn [tp|set|delete|info]"
    permission: sfcore.spawn.tp
  setspawn:
    description: Set the server spawn point to your current location.
    usage: "/<command>"
    permission: sfcore.spawn.set
  back:
    description: Return to your previous location.
    usage: "/<command>"
    permission: sfcore.back
  kill:
    description: Kill the living entity in your crosshairs.
    aliases: [crosskill, aimkill, targetkill]
    usage: "/<command>"
    permission: sfcore.kill
  tps:
    description: Show server TPS, MSPT, uptime, and online player counts.
    aliases: [lag, mspt, performance]
    usage: "/<command>"
    permission: sfcore.tps
  pl:
    description: List all loaded server plugins grouped by platform with status colors.
    aliases: [plugins]
    usage: "/<command>"
    permission: sfcore.pl
  top:
    description: Teleport to the highest safe block above you.
    aliases: [above, ground, up]
    usage: "/<command> [player]"
    permission: sfcore.top
  heal:
    description: Restore your health to full.
    usage: "/<command>"
    permission: sfcore.heal
  feed:
    description: Restore your hunger bar.
    usage: "/<command>"
    permission: sfcore.feed
  vital:
