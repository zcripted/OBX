    description: Set your walk speed (0-10).
    aliases: [wspeed]
    usage: "/<command> <0-10>"
    permission: sfcore.walkspeed
  freeze:
    description: Toggle a player's freeze state.
    aliases: [frz]
    usage: "/<command> <player>"
    permission: sfcore.freeze
