permissions:
  sfcore.*:
    description: Grants access to all SF-Core permissions.
    children:
      sfcore.help: true
      sfcore.info: true
      sfcore.about: true
      sfcore.permissions.view: true
      sfcore.commands.list: true
      sfcore.admin.*: true
      sfcore.debug.*: true
      sfcore.updates.*: true
      sfcore.home: true
      sfcore.home.set: true
      sfcore.home.delete: true
      sfcore.home.list: true
      sfcore.spawn.*: true
      sfcore.gamemode: true
      sfcore.gamemode.self: true
      sfcore.gamemode.others: true
      sfcore.back: true
      sfcore.kill: true
      sfcore.tps: true
      sfcore.pl: true
      sfcore.top: true
      sfcore.heal: true
      sfcore.feed: true
      sfcore.vital: true
      sfcore.god: true
      sfcore.vanish.*: true
      sfcore.invsee.*: true
      sfcore.craft: true
      sfcore.research: true
      sfcore.anvil: true
      sfcore.enchant: true
      sfcore.smith: true
      sfcore.stonecut: true
      sfcore.loom: true
      sfcore.grindstone: true
      sfcore.cartography: true
      sfcore.map: true
      sfcore.moderation.*: true
      sfcore.staff.*: true
      sfcore.warp.*: true
      sfcore.hub.*: true
      sfcore.admin.menu: true
      sfcore.version: true
      sfcore.language: true
      sfcore.holo.*: true
  sfcore.help:
    description: Allows access to /sf help.
    default: true
  sfcore.help.gui:
    description: Allows opening the paginated help GUI via /help, /?, /bukkit:?, /bukkit:help.
    default: true
  sfcore.list:
    description: Allows viewing the online player list via /list (and aliases).
    default: true
  sfcore.info:
    description: Allows access to /sf info.
    default: true
  sfcore.about:
    description: Allows access to /sf about.
    default: true
  sfcore.permissions.view:
    description: Allows viewing command permissions via /sf permissions.
    default: false
  sfcore.commands.list:
    description: Allows listing commands via /sf commands.
    default: true
  sfcore.admin.menu:
    description: Allows opening the admin menu via /sf.
    default: op
  sfcore.admin.*:
    description: Grants admin-level SF-Core actions.
    default: op
    children:
      sfcore.admin.reload: true
      sfcore.admin.reload.config: true
      sfcore.admin.reload.features: true
      sfcore.admin.diagnostics: true
      sfcore.admin.diagnostics.full: true
      sfcore.admin.menu: true
      sfcore.admin.modules.joinleave: true
      sfcore.admin.modules.joinmotd: true
      sfcore.moderation.*: true
      sfcore.staff.*: true
  sfcore.admin.reload:
    description: Allows running /sf reload.
    default: op
  sfcore.admin.reload.config:
    description: Allows running /sf reload config.
    default: op
  sfcore.admin.reload.features:
    description: Allows running /sf reload <file>.
    default: op
  sfcore.admin.diagnostics:
    description: Allows running /sf diagnostics.
    default: op
  sfcore.admin.diagnostics.full:
    description: Allows running /sf diagnostics full.
    default: op
  sfcore.admin.modules.joinleave:
    description: Allows toggling the join/leave broadcast module.
    default: op
  sfcore.admin.modules.joinmotd:
    description: Allows toggling the in-game join MOTD module.
    default: op
  sfcore.version:
    description: Allows viewing SF-Core version via /sf version.
    default: op
  sfcore.updates.*:
    description: Grants update/version management.
    default: op
    children:
      sfcore.updates.check: true
      sfcore.updates.notify: true
      sfcore.version: true
  sfcore.updates.check:
    description: Allows checking for updates via /sf updates and /sf updates check.
    default: op
  sfcore.updates.notify:
    description: Allows toggling update notifications via /sf updates notify.
    default: op
  sfcore.debug.*:
    description: Grants config & debug tools.
    default: op
    children:
      sfcore.debug: true
      sfcore.debug.config: true
      sfcore.debug.config.validate: true
      sfcore.debug.toggle: true
      sfcore.debug.dump: true
  sfcore.debug:
    description: Allows viewing debug status via /sf debug.
    default: op
  sfcore.debug.config:
    description: Allows viewing config status via /sf config.
    default: op
  sfcore.debug.config.validate:
    description: Allows validating configs via /sf config validate.
    default: op
  sfcore.debug.toggle:
    description: Allows toggling debug logging via /sf debug enable|disable.
    default: op
  sfcore.debug.dump:
    description: Allows writing debug dumps via /sf debug dump.
    default: op
  sfcore.home:
    description: Allows teleporting to a home.
    default: true
  sfcore.home.set:
    description: Allows creating a home.
    default: true
  sfcore.home.delete:
    description: Allows deleting a home.
    default: true
  sfcore.home.list:
    description: Allows listing homes.
    default: true
  sfcore.spawn.*:
    description: Grants all spawn-related permissions.
    default: op
    children:
      sfcore.spawn.tp: true
      sfcore.spawn.set: true
