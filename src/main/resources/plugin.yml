    description: List configured jail anchors.
    aliases: [jaillist]
    usage: "/<command>"
    permission: sfcore.jails
  setjail:
    description: Create a jail anchor at your current location.
    aliases: [jailset]
    usage: "/<command> <name>"
    permission: sfcore.setjail
  deljail:
    description: Delete a jail anchor.
    aliases: [jaildel]
    usage: "/<command> <name>"
    permission: sfcore.deljail
  jailtime:
    description: Show remaining jail time.
