name: SF-Core
main: dev.sergeantfuzzy.sfcore.Main
version: ${project.version}
description: Essentials-style core utilities. Single JAR, runtime-adapts to Paper / Spigot / PurPur / Folia from 1.8.8 to 26.1.x.
author: SergeantFuzzy
website: https://sfcore.sergeantfuzzy.dev
folia-supported: true
load: POSTWORLD
# api-version tells modern (1.13+) Paper / Spigot that this plugin uses the
# post-flattening API. Without it the server treats the plugin as "legacy"
# and bootstraps Bukkit's CraftLegacy material translation table — that init
# is what stalls modern startup for 15-30+ seconds with the warning
# "[CraftLegacy] Initializing Legacy Material Support. Unless you have
# legacy plugins and/or data this is a bug!"
#
# 1.13 is intentionally the lowest value: it satisfies every 1.13+ server
# (skipping the legacy init) while older 1.8 - 1.12 servers ignore the field
# entirely, so the single-JAR cross-version target is preserved. Material
# lookups in this plugin already cascade through name-fallback chains
# (e.g. WarpMenuStyling.resolveMaterial), so we never relied on the legacy
# translator in the first place.
api-version: '1.13'
libraries:
  - org.xerial:sqlite-jdbc:3.45.3.0
commands:
