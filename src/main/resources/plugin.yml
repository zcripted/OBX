name: ${plugin.name}
main: dev.zcripted.obx.OBX
version: ${plugin.fullversion}
description: "Obsidian eXtended — Forged from Obsidian. Essentials-style core utilities. Single JAR, runtime-adapts to Paper / Spigot / PurPur / Folia from 1.8.8 to 26.1.x."
author: zcripted
website: https://obx.zcripted.dev
folia-supported: true
load: POSTWORLD
api-version: '1.13'
libraries:
  - org.xerial:sqlite-jdbc:3.45.3.0
commands:
  afk:
    description: Toggle your AFK state.
    aliases: [away]
    usage: "/<command> [player]"
    permission: obx.afk
  anvil:
    description: Open a virtual anvil.
    aliases: [forge]
    usage: "/<command>"
    permission: obx.anvil
  back:
    description: Return to your previous location.
    usage: "/<command>"
    permission: obx.back
  balance:
    description: Show your or another player's balance.
    aliases: [bal, money]
    usage: "/<command> [player]"
    permission: obx.balance
  baltop:
    description: List the wealthiest players.
    aliases: [balancetop, moneytop]
    usage: "/<command> [page]"
    permission: obx.baltop
  ban:
    description: Permanently ban a player from the server.
    usage: "/<command> <player> [reason]"
    permission: obx.moderation.ban
  banlist:
    description: Show all active server bans.
    aliases: [blist]
    usage: "/<command>"
    permission: obx.moderation.banlist
  book:
    description: Get a writable book, unsign, or copy held book.
    usage: "/<command> [new|unsign|copy]"
    permission: obx.book
  broadcast:
    description: Broadcast a message to all online players.
    aliases: [bc]
    usage: "/<command> <message>"
    permission: obx.broadcast
  butcher:
    description: Kill nearby mobs.
    aliases: [killmobs]
    usage: "/<command> [radius] [type]"
    permission: obx.butcher
  cartography:
    description: Open a virtual cartography table.
    aliases: [ctable, cartograph]
    usage: "/<command>"
    permission: obx.cartography
  clearinv:
    description: Clear an inventory, optionally only a specific item.
    aliases: [ci, clearinventory]
    usage: "/<command> [player] [item] [maxCount]"
    permission: obx.clearinv
  craft:
    description: Open a virtual crafting table.
    aliases: [workbench, crafting]
    usage: "/<command>"
    permission: obx.craft
  day:
    description: Set the world's time to morning.
    usage: "/<command> [world]"
    permission: obx.time
  delhome:
    description: Delete one of your homes.
    usage: "/<command> <name>"
    permission: obx.home.delete
  deljail:
    description: Delete a jail anchor.
    aliases: [jaildel]
    usage: "/<command> <name>"
    permission: obx.deljail
  disposal:
    description: Open a trash inventory; items disappear when closed.
    aliases: [trash]
    usage: "/<command>"
    permission: obx.disposal
  eco:
    description: Manage player balances (staff).
    aliases: [economy]
    usage: "/<command> <give|take|set|reset> <player> [amount]"
    permission: obx.eco
  enchant:
    description: Open a virtual enchanting table.
    aliases: [enchanting, enchanttable]
    usage: "/<command>"
    permission: obx.enchant
  enchants:
    description: Browse the Arcanum custom enchantments (read-only). Use '/enchants settings' to toggle your combat effects.
    aliases: [scrolls]
    usage: "/<command> [settings]"
    permission: obx.enchants.browse
  enderchest:
    description: Open an ender chest, optionally another player's.
    aliases: [ec]
    usage: "/<command> [player]"
    permission: obx.enderchest
  feed:
    description: Restore your hunger bar.
    usage: "/<command>"
    permission: obx.feed
  firstseen:
    description: Show when a player first joined.
    usage: "/<command> <player>"
    permission: obx.firstseen
  fly:
    description: Toggle flight for yourself or another player.
    aliases: [flight]
    usage: "/<command> [player]"
    permission: obx.fly
  flyspeed:
    description: Set your fly speed (0-10), or another player's.
    aliases: [fspeed]
    usage: "/<command> <0-10> [player]"
    permission: obx.flyspeed
  freeze:
    description: Toggle a player's freeze state.
    aliases: [frz]
    usage: "/<command> <player>"
    permission: obx.freeze
  gamemode:
    description: Change your or another player's gamemode.
    aliases: [gm, gmode, mode, gms, gmc, gma, gmsp]
    usage: "/<command> <mode> [player]"
    permission: obx.gamemode
  give:
    description: Give a material stack to a player.
    usage: "/<command> <player> <material> [amount]"
    permission: obx.give
  god:
    description: Toggle complete invincibility.
    aliases: [gmode, godmode, invincible, immortal]
    usage: "/<command> [player]"
    permission: obx.god
  grindstone:
    description: Open a virtual grindstone.
    aliases: [gstone, grind, gs]
    usage: "/<command>"
    permission: obx.grindstone
  hat:
    description: Put the held item on your head.
    aliases: [head-on]
    usage: "/<command>"
    permission: obx.hat
  heal:
    description: Restore your health to full.
    usage: "/<command>"
    permission: obx.heal
  help:
    description: Opens the OBX paginated help GUI.
    aliases: ["?"]
    usage: "/<command>"
    permission: obx.help.gui
  holo:
    description: Manage OBX holograms.
    aliases: [hg, hologram]
    usage: "/<command> <subcommand> [args]"
    permission: obx.holo.use
  home:
    description: Teleport to one of your homes.
    usage: "/<command> [name]"
    permission: obx.home
  homes:
    description: List all of your homes.
    usage: "/<command>"
    permission: obx.home.list
  hub:
    description: Teleport to the hub / lobby world. Admins gain on/off/toggle/reload/give/selector/world subcommands.
    aliases: [lobby]
    usage: "/<command>"
    permission: obx.hub.use
  i:
    description: Give yourself a material stack.
    aliases: [item]
    usage: "/<command> <material> [amount]"
    permission: obx.item
  ignore:
    description: Toggle ignoring another player's messages.
    aliases: [block]
    usage: "/<command> [player]"
    permission: obx.ignore
  inbox:
    description: Open your private-message inbox.
    aliases: [inbound]
    usage: "/<command>"
    permission: obx.message
  info:
    description: Show a player profile card with quick actions.
    aliases: [profile]
    usage: "/<command> <player>"
    permission: obx.info.player
  invsee:
    description: View another player's inventory.
    aliases: [inv, isee, inventory, ivs, inventorysee]
    usage: "/<command> <player>"
    permission: obx.invsee.basic
  itemlore:
    description: Add, set, or clear lore on the held item.
    aliases: [lore]
    usage: "/<command> <add|set|clear> [index] <text>"
    permission: obx.itemlore
  itemname:
    description: Rename the item in your hand.
    aliases: [rename]
    usage: "/<command> <name|clear>"
    permission: obx.itemname
  jail:
    description: Jail a player.
    usage: "/<command> <player> <jail> [duration] [reason]"
    permission: obx.jail
  jails:
    description: List configured jail anchors.
    aliases: [jaillist]
    usage: "/<command>"
    permission: obx.jails
  jailtime:
    description: Show remaining jail time.
    usage: "/<command> [player]"
    permission: obx.jailtime
  kick:
    description: Kick an online player from the server.
    usage: "/<command> <player> [reason]"
    permission: obx.moderation.kick
  kill:
    description: Kill the living entity in your crosshairs.
    aliases: [crosskill, aimkill, targetkill]
    usage: "/<command>"
    permission: obx.kill
  kit:
    description: Claim or manage starter kits.
    aliases: [kits]
    usage: "/<command> [name|list|info|give|reload]"
    permission: obx.kit
  language:
    description: Change your preferred OBX language.
    usage: "/<command> <English|EN|German|DE>"
    permission: obx.language
  list:
    description: List online players and staff in separate sections.
    aliases: [players, online, who, playerlist]
    usage: "/<command>"
    permission: obx.list
  loom:
    description: Open a virtual loom.
    usage: "/<command>"
    permission: obx.loom
  mail:
    description: Send, read, list, or clear mail.
    usage: "/<command> <send|read|list|clear> [player] [message]"
    permission: obx.mail
  map:
    description: Open a virtual map centered on your surroundings.
    usage: "/<command>"
    permission: obx.map
  me:
    description: Broadcast an action-message in third person.
    aliases: [action]
    usage: "/<command> <action>"
    permission: obx.me
  more:
    description: Fill the held stack to its maximum size.
    aliases: [stack, max]
    usage: "/<command>"
    permission: obx.more
  msg:
    description: Send a private message to a player.
    aliases: [tell, pm, whisper]
    usage: "/<command> <player> <message>"
    permission: obx.message
  mute:
    description: Prevent a player from chatting.
    usage: "/<command> <player> [reason]"
    permission: obx.moderation.mute
  near:
    description: List players within range.
    aliases: [nearby]
    usage: "/<command> [radius]"
    permission: obx.near
  nick:
    description: Set your or another player's nickname.
    aliases: [nickname]
    usage: "/<command> <name|off> [player]"
    permission: obx.nick
  night:
    description: Set the world's time to night.
    usage: "/<command> [world]"
    permission: obx.time
  obx:
    description: Shows OBX help, information, and admin tools.
    aliases: [obsidian, obc]
    usage: "/obx <subcommand>"
  obxench:
    description: Arcanum custom-enchantment admin command.
    aliases: [obxenchant, obxe]
    usage: "/<command> <admin|give|givebook|apply|remove|list|info|reload|loot|protect|success|debug> | give <player> book <category>"
  pay:
    description: Pay another player from your balance.
    usage: "/<command> <player> <amount>"
    permission: obx.pay
  pl:
    description: List all loaded server plugins grouped by platform with status colors.
    aliases: [plugins]
    usage: "/<command>"
    permission: obx.pl
  playtime:
    description: Show a player's total playtime.
    aliases: [ptime]
    usage: "/<command> [player]"
    permission: obx.playtime
  pos:
    description: Show your current coordinates.
    aliases: [position]
    usage: "/<command>"
    permission: obx.position
  ptime:
    description: Set or reset your personal time override.
    usage: "/<command> <time|reset>"
    permission: obx.ptime
  pweather:
    description: Set or reset your personal weather override.
    usage: "/<command> <clear|rain|thunder|reset>"
    permission: obx.pweather
  realname:
    description: Look up the real name behind a display name.
    usage: "/<command> <displayname>"
    permission: obx.realname
  recall:
    description: Teleport to your Beacon's Memory recall point.
    usage: "/<command>"
    permission: obx.enchants.use
  repair:
    description: Repair the item in your hand or every repairable item.
    aliases: [fix]
    usage: "/<command> [all]"
    permission: obx.repair
  research:
    description: Display detailed information about a Minecraft item.
    aliases: [discover, itemprofile, iteminfo]
    usage: "/<command> [item]"
    permission: obx.research
  rply:
    description: Reply to your most recent private message.
    aliases: [reply, r]
    usage: "/<command> <message>"
    permission: obx.message
  satchel:
    description: Open your Satchel personal storage.
    usage: "/<command>"
    permission: obx.enchants.use
  seen:
    description: Show when a player was last seen online.
    aliases: [lastseen]
    usage: "/<command> <player>"
    permission: obx.seen
  sell:
    description: Sell items from your inventory.
    usage: "/<command> <hand|all|material>"
    permission: obx.sell
  sellall:
    description: Sell every saleable item in your inventory.
    usage: "/<command>"
    permission: obx.sellall
  sethome:
    description: Set a named home at your current location.
    usage: "/<command> [name]"
    permission: obx.home.set
  setjail:
    description: Create a jail anchor at your current location.
    aliases: [jailset]
    usage: "/<command> <name>"
    permission: obx.setjail
  setspawn:
    description: Set the server spawn point to your current location.
    usage: "/<command>"
    permission: obx.spawn.set
  skull:
    description: Give yourself a player head.
    aliases: [head]
    usage: "/<command> <player>"
    permission: obx.skull
  smite:
    description: Strike lightning at a player or your crosshair.
    aliases: [lightning]
    usage: "/<command> [player]"
    permission: obx.smite
  smith:
    description: Open a virtual smithing table.
    aliases: [smithing, smithtable]
    usage: "/<command>"
    permission: obx.smith
  socialspy:
    description: Toggle staff visibility of all private messages.
    aliases: [spy]
    usage: "/<command>"
    permission: obx.socialspy
  spawn:
    description: Teleport to the server spawn point or manage spawn.
    usage: "/spawn [tp|set|delete|info]"
    permission: obx.spawn.tp
  spawner:
    description: Change the spawned type of the spawner you are looking at.
    aliases: [setspawner]
    usage: "/<command> <type>"
    permission: obx.spawner
  spawnmob:
    description: Spawn mobs at your crosshair.
    aliases: [mob]
    usage: "/<command> <type> [count]"
    permission: obx.spawnmob
  sprache:
    description: Ändert deine bevorzugte OBX-Sprache.
    usage: "/<command> <Englisch|EN|Deutsch|DE>"
    permission: obx.language
  staff:
    description: Open the staff overview menu listing all online players.
    aliases: [staffmenu, sm]
    usage: "/<command>"
    permission: obx.staff.menu
  staffchat:
    description: Send a message visible only to staff.
    aliases: [sc, achat]
    usage: "/<command> <message>"
    permission: obx.staffchat
  status:
    description: View a player's moderation profile and action history.
    usage: "/<command> <player>"
    permission: obx.moderation.status
  stonecut:
    description: Open a virtual stonecutter.
    aliases: [chop, cut, scut]
    usage: "/<command>"
    permission: obx.stonecut
  sun:
    description: Clear the weather and set time to noon.
    usage: "/<command> [world]"
    permission: obx.weather
  tempban:
    description: Temporarily ban a player using the configured default duration.
    aliases: [tban]
    usage: "/<command> <player> [reason]"
    permission: obx.moderation.tempban
  time:
    description: Set or add to the world's time.
    usage: "/<command> <set|add> <value> [world]"
    permission: obx.time
  top:
    description: Teleport to the highest safe block above you.
    aliases: [above, ground, up]
    usage: "/<command> [player]"
    permission: obx.top
  tp:
    description: Teleport to a player, or move one player to another (admin).
    aliases: [teleport]
    usage: "/<command> <player> [target]"
    permission: obx.teleport.admin
  tpa:
    description: Request to teleport to another player.
    usage: "/<command> <player>"
    permission: obx.teleport.request
  tpaccept:
    description: Accept a pending teleport request.
    aliases: [tpyes]
    usage: "/<command>"
    permission: obx.teleport.request
  tpall:
    description: Teleport every online player to you.
    aliases: [tpeveryone]
    usage: "/<command>"
    permission: obx.tpall
  tpcancel:
    description: Cancel your outgoing teleport request.
    aliases: [tpc]
    usage: "/<command>"
    permission: obx.tpcancel
  tpdeny:
    description: Deny a pending teleport request.
    aliases: [tpno]
    usage: "/<command>"
    permission: obx.teleport.request
  tphere:
    description: Bring a player to your location (admin).
    usage: "/<command> <player>"
    permission: obx.teleport.admin
  tppos:
    description: Teleport to specific coordinates.
    aliases: [tpcoords]
    usage: "/<command> <x> <y> <z> [world] [yaw] [pitch]"
    permission: obx.tppos
  tps:
    description: Show server TPS, MSPT, uptime, and online player counts.
    aliases: [lag, mspt, performance]
    usage: "/<command>"
    permission: obx.tps
  tptoggle:
    description: Toggle accepting teleport requests.
    aliases: [tpt]
    usage: "/<command>"
    permission: obx.tptoggle
  tree:
    description: Generate a tree at your crosshair.
    usage: "/<command> [type]"
    permission: obx.tree
  unban:
    description: Remove an active ban from a player.
    usage: "/<command> <player> [reason]"
    permission: obx.moderation.unban
  unbreakable:
    description: Toggle unbreakable on the held item.
    aliases: [unb]
    usage: "/<command>"
    permission: obx.unbreakable
  unjail:
    description: Release a jailed player.
    usage: "/<command> <player>"
    permission: obx.unjail
  unmute:
    description: Remove an active mute from a player.
    usage: "/<command> <player> [reason]"
    permission: obx.moderation.unmute
  vanish:
    description: Toggle staff vanish — invisible to other players, ignored by mobs.
    aliases: [v, hide, sneak, ghost]
    usage: "/<command> [player]"
    permission: obx.vanish
  vital:
    description: Restore health and hunger in one action.
    aliases: [restore, regen]
    usage: "/<command> [player]"
    permission: obx.vital
  walkspeed:
    description: Set your walk speed (0-10).
    aliases: [wspeed]
    usage: "/<command> <0-10>"
    permission: obx.walkspeed
  warn:
    description: Issue a staff warning to a player.
    usage: "/<command> <player> [reason]"
    permission: obx.moderation.warn
  warp:
    description: Teleport to warps or manage them.
    aliases: [warps, w, goto, go, travel]
    usage: "/warp [name|tp|set|delete|info|list|gui]"
    permission: obx.warp
  weather:
    description: Change the weather.
    usage: "/<command> <clear|rain|thunder> [world]"
    permission: obx.weather
  whois:
    description: Show a player's detailed profile snapshot.
    usage: "/<command> <player>"
    permission: obx.whois
  worth:
    description: Look up the sell value of the item in your hand.
    aliases: [value]
    usage: "/<command> [amount]"
    permission: obx.worth
permissions:
  obx.*:
    description: Grants access to all OBX permissions.
    children:
      obx.about: true
      obx.admin.*: true
      obx.admin.menu: true
      obx.afk: true
      obx.afk.others: true
      obx.anvil: true
      obx.back: true
      obx.cartography: true
      obx.clearinv: true
      obx.clearinv.others: true
      obx.commands.list: true
      obx.craft: true
      obx.debug.*: true
      obx.enchant: true
      obx.feed: true
      obx.flyspeed: true
      obx.flyspeed.others: true
      obx.gamemode: true
      obx.gamemode.others: true
      obx.gamemode.self: true
      obx.god: true
      obx.grindstone: true
      obx.heal: true
      obx.help: true
      obx.holo.*: true
      obx.home: true
      obx.home.delete: true
      obx.home.list: true
      obx.home.set: true
      obx.hub.*: true
      obx.info: true
      obx.invsee.*: true
      obx.kill: true
      obx.language: true
      obx.loom: true
      obx.map: true
      obx.moderation.*: true
      obx.permissions.view: true
      obx.pl: true
      obx.research: true
      obx.smith: true
      obx.spawn.*: true
      obx.staff.*: true
      obx.stonecut: true
      obx.top: true
      obx.tps: true
      obx.updates.*: true
      obx.vanish.*: true
      obx.version: true
      obx.vital: true
      obx.warp.*: true
  obx.about:
    description: Allows access to /obx about.
    default: true
  obx.admin.*:
    description: Grants admin-level OBX actions.
    default: op
    children:
      obx.admin.diagnostics: true
      obx.admin.diagnostics.full: true
      obx.admin.menu: true
      obx.admin.modules.joinleave: true
      obx.admin.modules.joinmotd: true
      obx.admin.reload: true
      obx.admin.reload.config: true
      obx.admin.reload.features: true
      obx.moderation.*: true
      obx.staff.*: true
  obx.admin.diagnostics:
    description: Allows running /obx diagnostics.
    default: op
  obx.admin.diagnostics.full:
    description: Allows running /obx diagnostics full.
    default: op
  obx.admin.menu:
    description: Allows opening the admin menu via /obx.
    default: op
  obx.admin.modules.joinleave:
    description: Allows toggling the join/leave broadcast module.
    default: op
  obx.admin.modules.joinmotd:
    description: Allows toggling the in-game join MOTD module.
    default: op
  obx.admin.reload:
    description: Allows running /obx reload.
    default: op
  obx.admin.reload.config:
    description: Allows running /obx reload config.
    default: op
  obx.admin.reload.features:
    description: Allows running /obx reload <file>.
    default: op
  obx.afk:
    description: Allows toggling your own AFK status via /afk.
    default: true
  obx.afk.exempt:
    description: Exempts the holder from being auto-marked AFK after the idle timeout.
    default: false
  obx.afk.exempt-kick:
    description: Exempts the holder from the AFK idle auto-kick.
    default: false
  obx.afk.others:
    description: Allows toggling AFK status on another player via /afk <player>.
    default: op
  obx.anvil:
    description: Allows opening a virtual anvil with /anvil.
    default: op
  obx.back:
    description: Allows teleporting back to your previous location.
    default: true
  obx.cartography:
    description: Allows opening a virtual cartography table with /cartography.
    default: op
  obx.clearinv:
    description: Allows clearing your own inventory via /clearinv.
    default: op
  obx.clearinv.others:
    description: Allows clearing another player's inventory via /clearinv <player>.
    default: op
  obx.commands.list:
    description: Allows listing commands via /obx commands.
    default: true
  obx.craft:
    description: Allows opening a virtual crafting table with /craft.
    default: op
  obx.debug:
    description: Allows viewing debug status via /obx debug.
    default: op
  obx.debug.*:
    description: Grants config & debug tools.
    default: op
    children:
      obx.debug: true
      obx.debug.config: true
      obx.debug.config.validate: true
      obx.debug.dump: true
      obx.debug.toggle: true
  obx.debug.config:
    description: Allows viewing config status via /obx config.
    default: op
  obx.debug.config.validate:
    description: Allows validating configs via /obx config validate.
    default: op
  obx.debug.dump:
    description: Allows writing debug dumps via /obx debug dump.
    default: op
  obx.debug.toggle:
    description: Allows toggling debug logging via /obx debug enable|disable.
    default: op
  obx.enchant:
    description: Allows opening a virtual enchanting table with /enchant.
    default: op
  obx.enchants.*:
    description: Grants full access to the Arcanum enchantment module.
    default: op
    children:
      obx.enchants.admin: true
      obx.enchants.apply: true
      obx.enchants.book: true
      obx.enchants.browse: true
      obx.enchants.debug: true
      obx.enchants.give: true
      obx.enchants.list: true
      obx.enchants.loot: true
      obx.enchants.reload: true
      obx.enchants.use: true
  obx.enchants.admin:
    description: Open the Arcanum admin GUI with full access.
    default: op
  obx.enchants.apply:
    description: Apply and remove enchantments directly via /obxench apply and /obxench remove.
    default: op
