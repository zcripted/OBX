    aliases: [head-on]
    usage: "/<command>"
    permission: sfcore.hat
  clearinv:
    description: Clear your or another player's inventory.
    aliases: [ci, clearinventory]
    usage: "/<command> [player]"
    permission: sfcore.clearinv
  repair:
