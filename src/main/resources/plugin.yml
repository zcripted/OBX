    aliases: [lightning]
    usage: "/<command> [player]"
    permission: sfcore.smite
  tree:
    description: Generate a tree at your crosshair.
    usage: "/<command> [type]"
    permission: sfcore.tree
permissions:
  sfcore.*:
    description: Grants access to all SF-Core permissions.
    children:
      sfcore.help: true
      sfcore.info: true
      sfcore.about: true
      sfcore.permissions.view: true
      sfcore.commands.list: true
      sfcore.admin.*: true
      sfcore.debug.*: true
      sfcore.updates.*: true
      sfcore.home: true
      sfcore.home.set: true
      sfcore.home.delete: true
      sfcore.home.list: true
      sfcore.spawn.*: true
      sfcore.gamemode: true
      sfcore.gamemode.self: true
      sfcore.gamemode.others: true
      sfcore.back: true
      sfcore.kill: true
      sfcore.tps: true
      sfcore.pl: true
      sfcore.top: true
      sfcore.heal: true
      sfcore.feed: true
      sfcore.vital: true
      sfcore.god: true
      sfcore.vanish.*: true
      sfcore.invsee.*: true
      sfcore.craft: true
      sfcore.research: true
      sfcore.anvil: true
      sfcore.enchant: true
      sfcore.smith: true
      sfcore.moderation.*: true
      sfcore.staff.*: true
      sfcore.warp.*: true
      sfcore.admin.menu: true
      sfcore.version: true
      sfcore.language: true
  sfcore.help:
    description: Allows access to /sf help.
    default: true
  sfcore.help.gui:
    description: Allows opening the paginated help GUI via /help, /?, /bukkit:?, /bukkit:help.
    default: true
  sfcore.info:
    description: Allows access to /sf info.
    default: true
  sfcore.about:
    description: Allows access to /sf about.
    default: true
  sfcore.permissions.view:
    description: Allows viewing command permissions via /sf permissions.
    default: false
  sfcore.commands.list:
    description: Allows listing commands via /sf commands.
    default: true
  sfcore.admin.menu:
    description: Allows opening the admin menu via /sf.
    default: op
  sfcore.admin.*:
    description: Grants admin-level SF-Core actions.
    default: op
    children:
      sfcore.admin.reload: true
      sfcore.admin.reload.config: true
      sfcore.admin.reload.features: true
      sfcore.admin.diagnostics: true
      sfcore.admin.diagnostics.full: true
      sfcore.admin.menu: true
      sfcore.admin.modules.joinleave: true
      sfcore.admin.modules.joinmotd: true
      sfcore.moderation.*: true
      sfcore.staff.*: true
  sfcore.admin.reload:
    description: Allows running /sf reload.
    default: op
  sfcore.admin.reload.config:
    description: Allows running /sf reload config.
    default: op
  sfcore.admin.reload.features:
    description: Allows running /sf reload <file>.
    default: op
  sfcore.admin.diagnostics:
    description: Allows running /sf diagnostics.
    default: op
  sfcore.admin.diagnostics.full:
    description: Allows running /sf diagnostics full.
    default: op
  sfcore.admin.modules.joinleave:
    description: Allows toggling the join/leave broadcast module.
    default: op
  sfcore.admin.modules.joinmotd:
    description: Allows toggling the in-game join MOTD module.
    default: op
  sfcore.version:
    description: Allows viewing SF-Core version via /sf version.
    default: op
  sfcore.updates.*:
    description: Grants update/version management.
    default: op
    children:
      sfcore.updates.check: true
      sfcore.updates.notify: true
      sfcore.version: true
  sfcore.updates.check:
    description: Allows checking for updates via /sf updates and /sf updates check.
    default: op
  sfcore.updates.notify:
    description: Allows toggling update notifications via /sf updates notify.
    default: op
  sfcore.debug.*:
    description: Grants config & debug tools.
    default: op
    children:
      sfcore.debug: true
      sfcore.debug.config: true
      sfcore.debug.config.validate: true
      sfcore.debug.toggle: true
      sfcore.debug.dump: true
  sfcore.debug:
    description: Allows viewing debug status via /sf debug.
    default: op
  sfcore.debug.config:
    description: Allows viewing config status via /sf config.
    default: op
  sfcore.debug.config.validate:
    description: Allows validating configs via /sf config validate.
    default: op
  sfcore.debug.toggle:
    description: Allows toggling debug logging via /sf debug enable|disable.
    default: op
  sfcore.debug.dump:
    description: Allows writing debug dumps via /sf debug dump.
    default: op
  sfcore.home:
    description: Allows teleporting to a home.
    default: true
  sfcore.home.set:
    description: Allows creating a home.
    default: true
  sfcore.home.delete:
    description: Allows deleting a home.
    default: true
  sfcore.home.list:
    description: Allows listing homes.
    default: true
  sfcore.spawn.*:
    description: Grants all spawn-related permissions.
    default: op
    children:
      sfcore.spawn.tp: true
      sfcore.spawn.set: true
      sfcore.spawn.delete: true
      sfcore.spawn.info: true
  sfcore.spawn:
    description: Legacy spawn permission (teleport).
    default: true
    children:
      sfcore.spawn.tp: true
  sfcore.spawn.tp:
    description: Allows teleporting to spawn.
    default: true
  sfcore.spawn.set:
    description: Allows setting spawn.
    default: op
  sfcore.spawn.delete:
    description: Allows deleting/unsetting spawn.
    default: op
  sfcore.spawn.info:
    description: Allows viewing spawn info.
    default: true
  sfcore.back:
    description: Allows teleporting back to your previous location.
    default: true
  sfcore.kill:
    description: Allows killing the entity in your crosshairs.
    default: op
  sfcore.tps:
    description: Allows viewing server performance via /tps.
    default: op
  sfcore.pl:
    description: Allows listing server plugins grouped by platform via /pl.
    default: op
  sfcore.top:
    description: Allows teleporting to the highest safe block above you.
    default: op
  sfcore.heal:
    description: Allows healing yourself.
    default: op
  sfcore.feed:
    description: Allows feeding yourself.
    default: op
  sfcore.vital:
    description: Allows restoring health and hunger.
    default: op
  sfcore.god:
    description: Allows toggling god mode.
    default: op
  sfcore.vanish.*:
    description: Grants all vanish permissions (toggle self + others, higher tier).
    default: op
    children:
      sfcore.vanish: true
      sfcore.vanish.others: true
      sfcore.vanish.admin: true
  sfcore.vanish:
    description: Allows toggling vanish on yourself via /vanish. Lower tier — visible to other vanished staff with an above-head [L] indicator.
    default: op
  sfcore.vanish.others:
    description: Allows toggling vanish on other players via /vanish <player>.
    default: op
  sfcore.vanish.admin:
    description: Higher-tier vanish — invisible to every other player including other vanished staff. Lets the holder see lower-tier vanished users (with [L] above their head) without revealing themselves.
    default: op
  sfcore.invsee.*:
    description: Grants all inventory-see permissions (basic + full).
    default: op
    children:
      sfcore.invsee.basic: true
      sfcore.invsee.full: true
  sfcore.invsee.basic:
    description: Allows viewing inventories of non-op players that hold no invsee permission. Lower tier.
    default: op
