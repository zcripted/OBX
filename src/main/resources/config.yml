# ════════════════════════════════════════════════════════════════════════════
# JOIN / LEAVE BROADCAST MODULE
# ────────────────────────────────────────────────────────────────────────────
# Custom join and leave broadcasts shown to all online players.
# Full Adventure / MiniMessage formatting is supported, including:
#   • Legacy color codes (&a, &l, etc.)
#   • Hex colors via &#RRGGBB or <#RRGGBB>
#   • Gradients via <gradient:#A33CFF:#FFAA00>...</gradient>
#   • Hover tooltips via <hover:show_text:'line one\nline two'>...</hover>
#   • Click events via <click:run_command:'/spawn'>...</click>
#   • Decorations: <bold>, <italic>, <underlined>, <strikethrough>, <obfuscated>
#   • Shadow color via <shadow:#RRGGBB>...</shadow> (renders on 1.21.4+ clients)
# Available placeholders: {player}, {displayname}, {world}, {online}, {max}, {uuid}
# Adventure MiniMessage reference: https://docs.advntr.dev/minimessage/format.html
# ════════════════════════════════════════════════════════════════════════════
join-leave:
  enabled: true
  suppress-vanilla: true
  join-message: "<gradient:#55FF55:#00AAAA><bold>+</bold></gradient> &7{player} &fhas joined the server!"
  leave-message: "<gradient:#FF5555:#AA0000><bold>-</bold></gradient> &7{player} &fhas left the server."
  first-join:
    enabled: true
    message: "<gradient:#FFAA00:#FF55FF><bold>★</bold></gradient> &eWelcome &6{player}&e to the server for the first time! &7({online}/{max})"
# ════════════════════════════════════════════════════════════════════════════
# IN-GAME WELCOME MOTD
# ────────────────────────────────────────────────────────────────────────────
# Multi-line message shown to a player when they join the server. Supports the
# same Adventure / MiniMessage features as the join-leave broadcast above.
# Adventure MiniMessage reference: https://docs.advntr.dev/minimessage/format.html
# ════════════════════════════════════════════════════════════════════════════
join-motd:
  enabled: true
  lines:
    - " "
    - "          <hover:show_text:'<gold><bold>Welcome MOTD</bold></gold>\\n<dark_gray>━━━━━━━━━━━━━━━━━</dark_gray>\\n<gray>Customize or disable</gray>\\n<gray>this welcome message.</gray>\\n \\n<yellow>Config File</yellow>\\n<white>plugins/SF-Core/config.yml</white>\\n \\n<yellow>Lines Path</yellow>\\n<white>join-motd.lines</white>\\n \\n<yellow>First-Join Variant</yellow>\\n<white>join-motd.first-join.lines</white>\\n \\n<yellow>Toggle Off</yellow>\\n<white>join-motd.enabled: false</white>'><gradient:#FFAA00:#FFFF55><bold>Welcome to the Server</bold></gradient></hover>          "
    - "&7Hello, <hover:show_text:'<gold><bold>{player}</bold></gold>\\n<dark_gray>━━━━━━━━━━━━━━━━━</dark_gray>\\n<gray>UUID</gray>\\n<white>{uuid}</white>\\n \\n<gray>World</gray>\\n<white>{world}</white>'>&6{player}</hover>&7! Glad to see you again."
    - "&8• &eOnline: &f{online}&7/&f{max}"
    - "&8• &eType <hover:show_text:'<aqua><bold>Help Menu</bold></aqua>\\n<dark_gray>━━━━━━━━━━━━━━━━━</dark_gray>\\n<gray>Browse all available</gray>\\n<gray>SF-Core commands.</gray>\\n \\n<dark_gray>› Click to execute</dark_gray>'><click:run_command:'/sf help'>&b/sf help</click></hover>&e to view available commands."
    - "&8• &eDiscord: <hover:show_text:'<aqua><bold>Discord</bold></aqua>\\n<dark_gray>━━━━━━━━━━━━━━━━━</dark_gray>\\n<gray>Join our community</gray>\\n<gray>and stay connected.</gray>\\n \\n<dark_gray>› Click to open</dark_gray>'><click:open_url:'https://discord.gg/sergeantfuzzy'>&bhttps://discord.gg/sergeantfuzzy</click></hover>"
    - "&8• &7Made by &6SergeantFuzzy &8• <hover:show_text:'<green><bold>GitHub</bold></green>\\n<dark_gray>━━━━━━━━━━━━━━━━━</dark_gray>\\n<gray>Source code and</gray>\\n<gray>development hub.</gray>\\n \\n<dark_gray>› Click to open</dark_gray>'><click:open_url:'https://github.com/SergeantFuzzy/SF-Core'>&8[&aGitHub&8]</click></hover> <hover:show_text:'<gold><bold>Spigot</bold></gold>\\n<dark_gray>━━━━━━━━━━━━━━━━━</dark_gray>\\n<gray>Resource page</gray>\\n<gray>and discussion.</gray>\\n \\n<dark_gray>› Click to open</dark_gray>'><click:open_url:'https://www.spigotmc.org/resources/sf-core/'>&8[&6Spigot&8]</click></hover> <hover:show_text:'<aqua><bold>BuiltByBit</bold></aqua>\\n<dark_gray>━━━━━━━━━━━━━━━━━</dark_gray>\\n<gray>Marketplace page</gray>\\n<gray>and updates.</gray>\\n \\n<dark_gray>› Click to open</dark_gray>'><click:open_url:'https://builtbybit.com/resources/sf-core/'>&8[&bBuiltByBit&8]</click></hover>"
    - " "
  first-join:
    enabled: true
    lines:
      - " "
      - "          <gradient:#FF55FF:#5555FF><bold>A Brand New Adventure!</bold></gradient>          "
      - "&7Welcome for the very first time, &6{player}&7!"
      - "&8• &eRead the rules with <click:run_command:'/sf about'>&b/sf about</click>"
      - "&8• &eSet your home with &b/sethome &7and travel with &b/home"
      - "&8• &eHave fun! &cWe're glad you're here."
      - " "
