#
#
#
# Player-facing message TEXT (command feedback, join/leave broadcasts, the
# welcome MOTD, etc.) lives in the language files, not here:
#   plugins/OBX/languages/language_en.yml   (and sprache_de.yml)
# This file holds behavioural settings and module toggles only.
#
debug: false
teleport:
  warmup-seconds: 0
  send-messages: true
  cancel-on-move: false
targeting:
  kill:
    max-range: 40
homes:
  max-per-player: 5
spawn:
  teleport-on-first-join: false
  teleport-on-join: false
# ════════════════════════════════════════════════════════════════════════════
# JOIN / LEAVE BROADCAST + WELCOME MOTD MODULES (toggles only)
# ────────────────────────────────────────────────────────────────────────────
# These toggles enable/disable the modules. The MESSAGE TEXT was moved to the
# language files for one-stop editing:
#   languages/language_en.yml → welcome.join-message
#                               welcome.leave-message
#                               welcome.first-join-message
#                               welcome.motd-lines
#                               welcome.motd-first-join-lines
# (and the matching keys in sprache_de.yml). Those support full Adventure /
# MiniMessage markup (gradients, hover, click) and the placeholders
# {player}, {displayname}, {world}, {online}, {max}, {uuid}.
#
# In-game toggles: /obx joinleave <on|off>   and   /obx joinmotd <on|off>
# ════════════════════════════════════════════════════════════════════════════
join-leave:
  enabled: true
  suppress-vanilla: true
  first-join:
    enabled: true
join-motd:
  enabled: true
  first-join:
    enabled: true
resource-pack:
  enabled: false
  public-url: ""
tpa:
  # Seconds before an outgoing /tpa or /tpahere request expires.
  expiry-seconds: 60
afk:
  # Seconds of inactivity before a player auto-flips to AFK.
  idle-seconds: 300
  # Extra seconds after auto-AFK before they get kicked. 0 disables auto-kick.
  kick-seconds: 0
  # If true, AFK on/off is broadcast to all players. If false, only the player sees it.
  broadcast: true
economy:
  symbol: "$"
  currency-name: "Coin"
  currency-name-plural: "Coins"
  # Default balance for players the first time they're queried.
  starting-balance: 100.0
moderation:
  defaults:
    reason: "No reason provided."
    tempban-duration: "7d"
discord:
  moderation:
    enabled: true
    server-id: "1431483426267205785"
    channel-id: "1490820884976500877"
    webhook-url: "https://discord.com/api/webhooks/1490827278886768720/tTDGpeXlF8VpZUi4cq1sD9cAmiwFBm2AbO_x9a72acaorc2osVaf7cpCqTBY_0cWdAAD"
    webhook-username: "OBX Moderation"
    avatar-url: "https://i.ibb.co/4w4n3Chc/Logo-with-backgroundpng.png"
    footer-icon-url: "https://i.ibb.co/4w4n3Chc/Logo-with-backgroundpng.png"
    log-to-console: true
