# ═══════════════════════════════════════════════════════════════════════════
# OBX Shop — Main Menu
# ─────────────────────────────────────────────────────────────────────────────
# The /shop category menu. Each category points at shops/<file>.yml.
# Icons/names/lore accept legacy &-color codes.
# Apply edits with /shop reload (obx.shop.admin) or the
# Admin GUI → Economy → Shop tile (right-click).
# ═══════════════════════════════════════════════════════════════════════════
enabled: true
# Minutes until finite-stock items (items with a stock: value) restock to full.
restock-minutes: 60
# EcoShop-style price drift: buys push an item's price up, sells push it down.
# Sell prices can only sag BELOW base (never above) so drift can't be exploited.
dynamic-pricing:
  enabled: false
  # Multiplier change per net unit traded (0.0005 = ±5% after 100 net units).
  sensitivity: 0.0005
  # Hard bound on drift from the base price (0.15 = ±15%).
  max-drift: 0.15
  # Fraction of accumulated volume that decays away per day (prices self-recover).
  daily-decay: 0.25
