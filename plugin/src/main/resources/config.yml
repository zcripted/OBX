#
# This file holds behavioural settings and module toggles only.
#
debug: false

# ── Console banner ──────────────────────────────────────────────────────────
# Styling of the enable/disable console banner:
#   full    – OBX block logo, live hook & storage status markers, and the Docs/Support links.
#   compact – a one-line summary plus a single status line with the same live checks.
# The value is read each time the banner prints, so editing it and running
# /obx reload applies the new style to the next banner.
console:
  banner-style: full

# ── Update checks & notifications ───────────────────────────────────────────
updates:
  # Check once during startup and report the result to the console.
  check-on-startup: true
  # Re-check every N minutes while the server runs and announce a newly found
  # release. 0 disables re-checks.
  check-interval-minutes: 15
  # Master switch for the in-game notifications. Console
  # startup/announce lines are unaffected.
  notify-players: true

# ── Feature module toggles ──────────────────────────────────────────────────
# Flip a feature module on/off here
modules:
  # Death-item grouping: on death, all dropped items combine into ONE entity.
  # walking over it restores the items to your inventory.
  deathdrop: true

teleport:
  warmup-seconds: 0
  send-messages: true
  cancel-on-move: false
targeting:
  kill:
    max-range: 40
homes:
  max-per-player: 5
spawn:
  teleport-on-first-join: false
  teleport-on-join: false
# ════════════════════════════════════════════════════════════════════════════
# JOIN / LEAVE BROADCAST + WELCOME MOTD MODULES (toggles only)
# ────────────────────────────────────────────────────────────────────────────
# These toggles enable/disable the modules. The MESSAGE TEXT was moved to the
# language files for one-stop editing:
#   lang/en.yml → welcome.join-message
#                               welcome.leave-message
#                               welcome.first-join-message
#                               welcome.motd-lines
#                               welcome.motd-first-join-lines
#
# In-game toggles: /obx joinleave <on|off>   and   /obx joinmotd <on|off>
# ════════════════════════════════════════════════════════════════════════════
join-leave:
  enabled: true
  suppress-vanilla: true
  first-join:
    enabled: true
join-motd:
  enabled: true
  first-join:
    enabled: true
resource-pack:
  enabled: false
  public-url: ""
tpa:
  # Seconds before an outgoing /tpa or /tpahere request expires.
  expiry-seconds: 60
afk:
  # Master switch for the entire AFK system. When false, auto-AFK detection, the
  # AFK timeout/kick, and all AFK messages are turned off. Toggle in-game with
  # /obx afk <on|off> or via the Module Toggles admin GUI.
  enabled: true
  # Seconds of inactivity before a player auto-flips to AFK.
  idle-seconds: 300
  # Extra seconds after auto-AFK before they get kicked. 0 disables auto-kick.
  kick-seconds: 0
  # If true, AFK on/off is broadcast to all players. If false, only the player sees it.
  broadcast: true
economy:
  symbol: "$"
  currency-name: "Coin"
  currency-name-plural: "Coins"
  # Default balance for players the first time they're queried.
  starting-balance: 100.0
  # Days of /eco log audit history to keep (0 = keep forever).
  log-retention-days: 90
  pay:
    # Payments at or above this amount require /pay confirm (0 disables the gate).
    confirm-threshold: 0.0
    # Percent of every /pay burned as a transfer tax (money sink; 0 disables).
    tax-percent: 0.0
  sell:
    # Max money each player can earn from selling per day (0 = unlimited).
    # Applies to /sell, /sellall, shop right-click sells and the Sell-Items GUI.
    daily-cap: 0.0
    # Material for the sell-all-from-chest wand item (default: BLAZE_ROD).
    wand-item: "BLAZE_ROD"
    # Display name for the wand item (& codes supported).
    wand-name: "&6&lSell &e&lWand"
  bank:
    # /bank — interest-bearing savings. Interest accrues lazily (daily compound).
    enabled: true
    interest-percent-daily: 0.5
    max-balance: 1000000000.0
    # Tiered interest rates (optional). Remove or leave empty for a flat rate.
    # Each tier has a rate (percent daily) plus EITHER min-balance (balance tier)
    # OR permission (rank tier — give the node via your permissions plugin; it is
    # matched while the owner is online, which is when interest is applied).
    # The highest matching rate wins.
    # tiers:
    #   - min-balance: 100000
    #     rate: 0.75
    #   - min-balance: 1000000
    #     rate: 1.0
    #   - permission: obx.bank.tier.vip
    #     rate: 1.25
  payday:
    # Scheduled salary for online players holding obx.payday.
    enabled: false
    interval-minutes: 60
    amount: 50.0
  auction:
    # /ah — player auction house.
    enabled: true
    max-listings: 5
    duration-hours: 48
    # Charged when listing an item (0 = free). Collected by the server account.
    # (visible via /eco server)
    listing-fee: 0.0
    # Percent of the sale price kept by the house (0 = seller gets all).
    # Collected by the server account (visible via /eco server).
    tax-percent: 0.0
    # Purchases at or above this amount require a second confirmation click.
    # 0 disables the confirmation gate.
    confirm-threshold: 10000.0
  banknote:
    # Optional list of fixed denominations for /withdraw tab-completion.
    # When empty, any amount can be withdrawn (single note).
    denominations: [10, 50, 100, 500, 1000, 5000, 10000, 50000]
    # Craft redemption: banknotes placed ALONE in a crafting grid show a
    # "Redeem" result — clicking it cashes every note in the grid at once.
    craft-redeem: true
  sinks:
    # Fee charged when a player takes an item from an anvil. 0 = disabled.
    # Collected by the server account (visible via /eco server).
    anvil-repair-fee: 0.0
    claim-upkeep:
      # Daily upkeep per land claim, charged to ONLINE owners (max 7 days of
      # backlog) and collected by the server account. Needs a supported claims
      # plugin — currently GriefPrevention (OBX has no claims module of its
      # own) without one the sink stays idle. obx.upkeep.exempt skips a player.
      enabled: false
      fee-per-claim: 25.0
    weekly-top:
      # Take a snapshot of the top N balances every Monday for /baltop weekly.
      enabled: true
      top-size: 50
  reporting:
    # Optional Discord webhook URL for weekly economy digests.
    # Leave empty to only log to console.
    discord-webhook: ""
moderation:
  defaults:
    reason: "No reason provided."
    tempban-duration: "7d"
  # Commands a muted player is prevented from running, so a mute can't be
  # bypassed through command-based messaging. Use the base command label without
  # a slash (namespaced forms like "minecraft:me" are matched automatically).
  # Non-communication commands (e.g. /spawn, /home) are never blocked.
  muted-blocked-commands:
    - msg
    - tell
    - whisper
    - w
    - pm
    - dm
    - t
    - r
    - reply
    - mail
    - me
    - say
    - shout
    - broadcast
    - bc
discord:
  moderation:
    # Mirror moderation actions (bans, kicks, mutes, warns) to a Discord channel.
    # 1) In Discord: Server Settings -> Integrations -> Webhooks -> New Webhook,
    #    pick your moderation channel, then "Copy Webhook URL".
    # 2) Paste the URL below, fill in your server/channel IDs, set enabled: true.
    # The webhook URL is a SECRET - anyone who has it can post to your channel.
    enabled: false
    server-id: ""
    channel-id: ""
    webhook-url: ""
    webhook-username: "OBX Moderation"
    avatar-url: "https://i.ibb.co/gFXmQ3Tk/obx-icon-512.png"
    footer-icon-url: "https://i.ibb.co/gFXmQ3Tk/obx-icon-512.png"
    log-to-console: true

# Startup warnings about settings that still hold their shipped blank/placeholder values.
warnings:
  # While any Discord webhook setting above is unconfigured,
  # OBX warns the console on startup and admins on join.
  # The warnings stop automatically once real values are in place.
  # Toggle live with /obx warn on|off or the Admin GUI Module Toggles
  # Use /obx reload (or /obx reload config) to take effect.
  webhook-unconfigured: true
links:
  builtbybit: "https://builtbybit.com/resources/OBX"
  wiki: "https://github.com/zcripted/OBX"
  discord: "https://discord.gg/UxktSyT9Ag"
