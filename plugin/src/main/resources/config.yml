    VeryPotter:
      name: "VeryPotter"
      uuid: "11c0d534-1e39-44eb-b2cd-90fb5e2b12d7"
      note: "Regression profile for tempban and banlist output."
links:
  builtbybit: "https://builtbybit.com/resources/OBX"
  wiki: "https://github.com/zcripted/OBX"
  discord: "https://discord.gg/UxktSyT9Ag"
