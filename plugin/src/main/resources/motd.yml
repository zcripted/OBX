# =============================================================================
# OBX MOTD configuration
# Placeholders: {online}, {max}, {real_online}, {real_max}
# =============================================================================

enabled: true

motd:
  center-pixels: 154
  line-1: "<center><gradient:#2A0A45:#6A1B9A><bold>OBX</bold></gradient> &7| &eModern + Legacy Support"
  line-2: "<center>&7Players: &f{online}&7/&f{max}"

player-count:
  online:
    mode: "real"
    fake: 0
  max: 200
  hover:
    enabled: true
    display-mode: "lines" # profiles = player names, lines = custom hover text
    sample-profiles:
      - "ChanceDaRepper"
      - "HotPotato"
      - "VeryPotter"
    lines:
      # NOTE: the server-list player-count hover renders sample names with the 16
      # STANDARD legacy colors only — &x truecolor hex / <gradient> shows up white
      # here. So this line uses &d (light purple) + &5 (dark purple)
      # to stay on-brand and actually display.
      - "&d&lOBX &5&o— Forged from Obsidian"
      - "&7Displayed Count: &f{online}&7/&f{max}"
      - "&7Live Online: &f{real_online}&7/&f{real_max}"
      - "&ePowered by OBX"
