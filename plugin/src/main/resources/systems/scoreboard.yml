# ════════════════════════════════════════════════════════════════════════════
# OBX Scoreboard (sidebar)
# ────────────────────────────────────────────────────────────────────────────
# A sidebar shown to every player.
#
# Placeholders available in the title and every line:
#   {plugin}          - Plugin name (OBX)
#   {player}          - Player account name
#   {displayname}     - Player display name
#   {world}           - Current world
#   {online}          - Online player count (live)
#   {max}             - Server slot count
#   {health}          - Current health (rounded)
#   {max_health}      - Maximum health (rounded)
#   {health_percent}  - Health as a percentage, e.g. 93
#   {hearts}          - A ❤/♡ bar that fills with current health
#   {balance}         - Player's full economy balance with the currency symbol ($1,250.00)
#   {bank}            - Alias of {balance}
#   {ip}              - server-ip below
#   {website}         - server-website below
#
# Line notes:
#   • Empty strings ("") render as blank spacer lines.
#   • Up to 15 lines are shown (extras are ignored).
#   • Each line is capped at ~32 visible characters on 1.8–1.12 (longer on 1.13+).
# ════════════════════════════════════════════════════════════════════════════

enabled: true

# How often (server ticks; 20 = 1s) the sidebar is re-rendered for live fields.
refresh-interval-ticks: 20

# Sidebar title.
title: "<gradient:#9D4EDD:#C77DFF><bold>OBX</bold></gradient>"

# Server address + website shown via {ip} / {website}.
server-ip: "play.example.net"
server-website: "example.net"

# Sidebar lines, top to bottom.
lines:
  - "{divider}"
  - "&d☻ &7Player &8» &f{player}"
  - "&c❤ &7Health &8» {hearts}"
  - "              &c{health_percent}%"
  - "&a● &7Online &8» &a{online}&7/&a{max}"
  - "&a⛁ &7Bank &8» &a{balance}"
  - "{divider}"
  - "&d⇆ &7IP &8» &d{ip}"
  - "&d⊕ &7Web &8» &d{website}"
  - "{divider}"