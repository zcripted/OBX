# ════════════════════════════════════════════════════════════════════════════
# OBX Holograms
# ────────────────────────────────────────────────────────────────────────────
# Custom hologram system — no ProtocolLib / PacketEvents / external runtime
# dependencies.
#
# Holograms persist in a separate file (`holograms.yml`).
# ════════════════════════════════════════════════════════════════════════════

# Master toggle. When false the entire module is dormant.
# Enabled by default so holograms work out of the box.
enabled: true

# Viewer tracker tick interval. Smaller = snappier range/visibility updates.
view-update-ticks: 5

# Soft cap on per-viewer entities for lines with per-player text. When a
# hologram has more viewers than this number it falls back to shared text
# mode and logs an info notice.
per-viewer-soft-cap: 64

# Default ranges applied to newly-created holograms. Operators may override
# per-hologram via `/holo showrange <holo> <distance>`.
defaults:
  show-range: 48
  update-range: 64
  scale: 1.0
  billboard: CENTER
  double-sided: true

# Interaction defaults
interaction:
  # Soft cooldown applied between successive clicks per player per hologram,
  # in milliseconds. Keeps spam-clicked commands from running away.
  default-cooldown-ms: 500
  # Default look-direction raycast frequency when the custom packet layer is
  # unavailable. Lower for very large servers.
  raycast-hz: 4
  # Per-(player, hologram) wall-occlusion cache lifetime in ticks.
  occlusion-cache-ticks: 5

# Logging knobs. Turn on `debug-spawns` to print one line every time a viewer
# is added/removed — useful when diagnosing visibility-cull bugs.
logging:
  debug-spawns: false
