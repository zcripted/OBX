# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# OBX Hub / Lobby
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Multi-server style hub / lobby toolkit. When a player is in one of the
# configured hub worlds (`worlds:` below) AND `enabled: true`, OBX
# applies the hub kit on join / respawn / world-change and processes the
# hotbar items (server selector, jump rod, vanish-all toggle, launchpad).
#
# Hub-mode is per-world by design вЂ” multi-world setups can use OBX both
# as a hub plugin (on `hub`, `lobby`, etc.) and as essentials on game worlds.
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ

# Master toggle. When false the entire system is dormant.
enabled: false

# Set true ONLY if this entire server is a dedicated hub/lobby with no survival
# worlds. It is the safety gate for the destructive 'kit.clear-inventory' wipe
# below: when false (the default), OBX will NOT wipe a player's inventory on
# entering a hub world, so a mixed/single server can't delete survival items.
# Leave false unless the server has nothing but hub worlds.
dedicated-server: false

# Worlds where hub-mode is active. Outside these worlds OBX behaves
# exactly like before (essentials-style core). Case-sensitive world names
# as reported by Bukkit.getWorld().getName().
worlds:
  - "hub"
  - "lobby"

# Kit applied on join into a hub world, on respawn within one, on world
# change into one, and to every currently-online hub-world player when
# hub-mode is toggled on.
kit:
  # Clear the player's inventory before applying the hub kit. Disable if
  # you'd rather merge the kit into whatever the player is carrying.
  # NOTE: this wipe only happens when 'dedicated-server: true' above вЂ” on a
  # mixed/single server it is skipped (with a console warning) to avoid
  # deleting survival inventories when a player enters a hub world.
  clear-inventory: true
  # Give the kit again on respawn while in a hub world.
  give-on-respawn: true
  # Lock the hotbar so hub items can't be dropped, swapped to another slot,
  # or moved into chests. Items in non-hotbar slots remain untouched.
  lock-hotbar: true

# Hotbar items. Each entry has:
#   enabled        : per-item toggle
#   slot           : hotbar slot 0вЂ“8
#   material       : Bukkit material name (first match wins, see fallbacks)
#   material-fallback: ordered list of alternates for older versions
#   name           : display name (legacy & MiniMessage color codes supported)
#   lore           : tooltip lines
items:
  server-selector:
    enabled: true
    slot: 0
    # NOTE: avoid COMPASS here if WorldEdit is installed вЂ” WorldEdit's navigation
    # wand is a compass (right-click = /thru, left-click = /jumpto), so a compass
    # would teleport players (with worldedit.navigation.* perms) to their
    # crosshairs in addition to opening this menu.
    material: "NETHER_STAR"
    material-fallback: ["NETHER_STAR", "COMPASS"]
    name: "&5&lServer Selector &7(Right-Click)"
    lore:
      - "&8&mв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ"
      - "&7Open the server selector"
      - "&7to switch between servers."
      - ""
      - "&eвЂє &fRight-click to open"
      - "&8&mв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ"

  jump-rod:
    enabled: true
    slot: 1
    material: "FISHING_ROD"
    material-fallback: ["FISHING_ROD"]
    name: "&d&lJump-To Rod &7(Cast)"
    lore:
      - "&8&mв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ"
      - "&7Cast the rod to teleport"
      - "&7to where it lands."
      - ""
      - "&eвЂє &fRight-click to cast"
      - "&8&mв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ"
    # Max travel distance for the hook (vanilla rod range is ~30 blocks).
    max-distance: 60

  vanish-all:
    enabled: true
    slot: 4
    # Two states (visible / hidden). Each state has its own item.
    visible:
      material: "LIME_DYE"
      material-fallback: ["LIME_DYE", "INK_SACK", "DYE"]
      name: "&a&lPlayers: &2Visible &7(Right-Click)"
      lore:
        - "&8&mв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ"
        - "&7You can currently see"
        - "&7other players in the hub."
        - ""
        - "&eвЂє &fRight-click to hide them"
        - "&8&mв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ"
    hidden:
      material: "GRAY_DYE"
      material-fallback: ["GRAY_DYE", "INK_SACK", "DYE"]
      name: "&7&lPlayers: &8Hidden &7(Right-Click)"
      lore:
        - "&8&mв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ"
        - "&7Other players are hidden"
        - "&7from your view."
        - ""
        - "&eвЂє &fRight-click to show them"
        - "&8&mв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ"

  launchpad:
    enabled: true
    # Last hotbar slot (slots are 0вЂ“8).
    slot: 8
    material: "FIREWORK_ROCKET"
    material-fallback: ["FIREWORK_ROCKET", "FIREWORK", "FEATHER"]
    name: "&e&lLaunchpad &7(Double-Jump)"
    lore:
      - "&8&mв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ"
      - "&7Hold and double-tap"
      - "&7&lSPACE &7to launch."
      - ""
      - "&eвЂє &fNo fall damage on landing"
      - "&8&mв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ"
    # Cooldown applied to each player after a launch. Reasonable & fair
    # default is 3 seconds.
    cooldown-seconds: 3
    forward-power: 1.4
    up-power: 1.0

# Server list shown in the selector GUI. Each entry:
#   id           : BungeeCord / Velocity server name (Connect target)
#   display-name : item display name (legacy color codes supported)
#   slot         : GUI slot 0вЂ“53 (-1 в†’ auto-assign in order)
#   material     : icon material
#   material-fallback: ordered alternates
#   lore         : static lore (live online-count is appended automatically)
selector:
  title: "&5&lServer Selector"
  rows: 3
  ping-cache-seconds: 5
  # Decorative outline of glass panes around the icons.
  outline:
    enabled: true
    material: "GRAY_STAINED_GLASS_PANE"
    material-fallback: ["GRAY_STAINED_GLASS_PANE", "STAINED_GLASS_PANE", "GLASS_PANE"]
  # Close button that shuts the selector. slot: -1 auto-places it at the bottom-center.
  close-button:
    enabled: true
    slot: -1
    material: "BARRIER"
    material-fallback: ["BARRIER", "RED_STAINED_GLASS_PANE", "BEDROCK"]
  servers:
    survival:
      id: "survival"
      display-name: "&a&lSurvival"
      slot: 11
      material: "GRASS_BLOCK"
      material-fallback: ["GRASS_BLOCK", "GRASS"]
      lore:
        - "&8&mв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ"
        - "&7Vanilla-plus survival"
        - "&7with land claims & shops."
        - "&8&mв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ"
    creative:
      id: "creative"
      display-name: "&d&lCreative"
      slot: 13
      material: "DIAMOND_BLOCK"
      material-fallback: ["DIAMOND_BLOCK"]
      lore:
        - "&8&mв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ"
        - "&7Plot-based creative world"
        - "&7with WorldEdit access."
        - "&8&mв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ"
    minigames:
      id: "minigames"
      display-name: "&d&lMinigames"
      slot: 15
      material: "EMERALD"
      material-fallback: ["EMERALD"]
      lore:
        - "&8&mв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ"
        - "&7PvP arenas, parkour,"
        - "&7and party games."
        - "&8&mв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ"
