# ════════════════════════════════════════════════════════════════════════════
# OBX Chat Management
# ────────────────────────────────────────────────────────────────────────────
# Customise the layout and styling of in-game chat.
#   • Legacy color codes  &a, &l, etc.
#   • Hex colors          &#RRGGBB or <#RRGGBB>
#   • Named colors        <gray>, <yellow>, <dark_purple>, ...
#   • Gradients           <gradient:FA:FB>...</gradient>
#   • Decorations         <bold>, <italic>, <underlined>, <strikethrough>
#   • Hover tooltip       <hover:show_text:'line one\nline two'>...</hover>
#   • Click events        <click:run_command:'/obx'>...</click>
#   • Shadow color        <shadow:#RRGGBB>...</shadow>
#
# Adventure MiniMessage reference:
#   https://docs.advntr.dev/minimessage/format.html
#
# Available placeholders:
#   {player}       - Player's account name
#   {displayname}  - Player's display name (may include nickname / prefix)
#   {message}      - The chat message contents
#   {world}        - Name of the world the player is currently in
#   {username}     - The rendered username component
#   {separator}    - The rendered separator component
# ════════════════════════════════════════════════════════════════════════════

enabled: true

# When true, every chat message is also written to the server console
# Requires a terminal (or log viewer).
console-mirror: true

# Prepend a timestamp to console-mirrored chat lines.
console-timestamp: true

# DateTimeFormatter pattern used when console-timestamp is true.
console-timestamp-format: "'['HH:mm:ss' INFO]: '"

# When false, the literal characters "<" and ">" inside a player's message
# are replaced with visually-similar Unicode chars so players cannot inject
# MiniMessage tags. Set true to allow MiniMessage parsing of player input
# (recommended only when a permission gate is enforced upstream).
allow-formatting-in-messages: false

format:
  # Master template combining the components below. Each "{<name>}" reference
  # substitutes the rendered component output. Plain text and additional
  # MiniMessage tags around the components are honored.
  template: "{username} {separator} {message}"

  components:
    # Staff tag shown immediately before the name of OP players. Default renders
    # as a red, bold small-caps "STAFF" followed by a heavy vertical bar
    # Set enabled to false to turn it off.
    prefix:
      enabled: true
      op: "<red><bold>ѕᴛᴀꜰꜰ ┃ </bold></red>"
    username:
      template: "<#AAAAAA>{player}</#AAAAAA>"
      staff-template: "<red>{player}</red>"
    separator:
      character: "»"
      template: "<#6A1B9A>{character}</#6A1B9A>"
    message:
      template: "<#FFFFFF>{message}</#FFFFFF>"
#
#
# ╔══════════════════════════════════════════════════════════════╗
# ║                          END OF FILE                         ║
