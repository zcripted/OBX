# ════════════════════════════════════════════════════════════════════════════
# OBX Tablist
# ────────────────────────────────────────────────────────────────────────────
# Customise the in-game player list (TAB) header, footer, and individual
# entry name.
# set:
#   • Legacy color codes  &a, &l, etc.
#   • Hex colors          &#RRGGBB or <#RRGGBB>
#   • Named colors        <gray>, <yellow>, <dark_purple>, ...
#   • Gradients           <gradient:#A:#B>...</gradient>
#   • Decorations         <bold>, <italic>, <underlined>, <strikethrough>
#   • Hover tooltip       <hover:show_text:'line one\nline two'>...</hover>
#   • Click events        <click:run_command:'/obx'>...</click>
#   • Shadow color        <shadow:#RRGGBB>...</shadow>
#
# Adventure MiniMessage reference:
#   https://docs.advntr.dev/minimessage/format.html
#
# Available placeholders inside any template:
#   {player}       - Player's account name
#   {displayname}  - Player's display name (may include nickname / prefix)
#   {world}        - World the player is currently in
#   {online}       - Online player count
#   {max}          - Server slot count
#   {ping}         - Player's latency in ms
#   {time}         - Current server wall-clock time (HH:mm:ss)
#   {tps}          - Server TPS rounded to one decimal (best-effort)
#   {uptime}       - Server uptime since start (e.g. "3d 04:21:07"), live-ticking
#   {motd-1}       - First MOTD line (resolved through the existing MOTD service)
# ════════════════════════════════════════════════════════════════════════════

enabled: true

# How often (in server ticks, 20 ticks = 1 second) the tablist is refreshed
# for every online player so that live placeholders ({online}, {ping}, {tps},
# {uptime}, {time}) tick in real time.
refresh-interval-ticks: 10

header:
  - " "
  - "          <gradient:#9D4EDD:#C77DFF><bold>OBX Network</bold></gradient>          "
  - "&7Online &8» &d{online}&7/&d{max}   &7TPS &8» &d{tps}   &7Uptime &8» &d{uptime}"
  - " "

# Footer lines shown below the player list.
footer:
  - " "
  - "&7World &8» &d{world}   &7Ping &8» &d{ping}&7ms"
  - "&7Time &8» &d{time}"
  - "<gradient:#9D4EDD:#C77DFF>discord.gg/UxktSyT9Ag</gradient>"
  - " "

# Per-player entry shown in the list itself. Set to an empty string to keep
# the vanilla / scoreboard team name behaviour.
player-format: "<#AAAAAA>{player}</#AAAAAA>"

# Group staff (OP players) together, separated from regular players, in the TAB
# list.
staff-grouping:
  enabled: true
  # Tablist name for OP/staff.
  player-format: "<red><bold>ѕᴛᴀꜰꜰ ┃ </bold></red><red>{player}</red>"
#
#
# ╔══════════════════════════════════════════════════════════════╗
# ║                          END OF FILE                         ║
