# ════════════════════════════════════════════════════════════════════════════
# OBX Kits
# ────────────────────────────────────────────────────────────────────────────
# Each kit is defined under "kits.<name>". Permissions:
#   obx.kit.<name>     — required to claim the kit (kits.* bypasses all)
# ════════════════════════════════════════════════════════════════════════════
# First-join kits — when enabled, a brand-new player automatically receives every
# kit flagged "first-join: true" below on their first login (one time only; the
# claim is recorded so it never repeats). Set enabled: false to turn the whole
# behaviour off without editing individual kits.
first-join:
  enabled: true

kits:
  starter:
    display-name: "&aStarter Kit"
    cooldown-seconds: 86400
    first-join: true
    icon: CHEST
    items:
      - "WOODEN_SWORD"
      - "WOODEN_PICKAXE"
      - "WOODEN_AXE"
      - "WOODEN_SHOVEL"
      - "BREAD:8"
      - "TORCH:16"
  miner:
    display-name: "&5Miner Kit"
    cooldown-seconds: 43200
    icon: IRON_PICKAXE
    items:
      - "STONE_PICKAXE"
      - "STONE_SHOVEL"
      - "TORCH:32"
      - "COOKED_BEEF:16"
  builder:
    display-name: "&dBuilder Kit"
    cooldown-seconds: 21600
    icon: BRICKS
    items:
      - "OAK_PLANKS:64"
      - "COBBLESTONE:64"
      - "GLASS:32"
      - "TORCH:16"
